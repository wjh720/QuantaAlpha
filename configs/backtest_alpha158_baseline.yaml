######################################################################
# Backtest tool V2 configuration
# Alpha158-only baseline, results saved to a separate directory
######################################################################

random_seed: 42

experiment:
  name: "backtest_alpha158_baseline"
  recorder: "backtest_v2_recorder"
  output_dir: "data/results/backtest_alpha158_baseline"
  output_metrics_file: "backtest_metrics.json"

factor_source:
  type: "alpha158"

  custom:
    json_files: []
    quality_filter: null
    max_factors: null
    use_llm_for_incompatible: true

  combined:
    official_source: "alpha158"
    include_custom: false

data:
  provider_uri: "data/us_data"
  region: "us"
  market: "sp500"
  start_time: "2008-01-01"
  end_time: "2020-11-10"

dataset:
  label: "Ref($close, -2) / Ref($close, -1) - 1"

  learn_processors:
    - class: "Fillna"
      kwargs:
        fields_group: "feature"
    - class: "ProcessInf"
    - class: "DropnaLabel"
    - class: "CSRankNorm"
      kwargs:
        fields_group: "feature"
    - class: "CSRankNorm"
      kwargs:
        fields_group: "label"

  infer_processors:
    - class: "Fillna"
      kwargs:
        fields_group: "feature"
    - class: "ProcessInf"
    - class: "CSRankNorm"
      kwargs:
        fields_group: "feature"
    - class: "CSRankNorm"
      kwargs:
        fields_group: "label"

  segments:
    train: ["2008-01-01", "2016-12-31"]
    valid: ["2017-01-01", "2018-12-31"]
    test: ["2019-01-01", "2020-11-10"]

model:
  type: "lgb"
  params:
    loss: "mse"
    learning_rate: 0.1
    max_depth: 8
    num_leaves: 210
    colsample_bytree: 0.8879
    subsample: 0.8789
    lambda_l1: 205.6999
    lambda_l2: 580.9768
    num_threads: 20
    seed: 42
    random_state: 42
    early_stopping_round: 50
    num_boost_round: 500
    min_child_samples: 100
    feature_fraction_bynode: 0.8

backtest:
  strategy:
    class: "TopkDropoutStrategy"
    module_path: "qlib.contrib.strategy"
    kwargs:
      signal: "<PRED>"
      topk: 50
      n_drop: 5

  backtest:
    start_time: "2019-01-01"
    end_time: "2020-11-10"
    account: 100000000
    benchmark: "^GSPC"
    exchange_kwargs:
      limit_threshold: null
      deal_price: "open"
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5

llm:
  enabled: true
  timeout: 300
  max_retries: 3
  cache_results: true
  cache_dir: "data/results/factor_cache"
  auto_extract_cache: false
  debug: false

factor_calculation:
  output_dir: "data/results/backtest_alpha158_baseline/computed_factors"
  save_intermediate: true
  n_jobs: 4
  data_file: null
